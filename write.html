<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heartspace — Write Story</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a href="dashboard.html" class="brand">
      <span class="brand-mark">❤</span>

      <a href="dashboard.html">Dashboard</a>

      <a class="btn btn-ghost" href="dashboard.html">Back to Dashboard</a>
    </div>
  </div>
</header>

<main>
  <section class="section">
    <div class="container">
      <div class="section-head">
        <div>
          <h2>Write Your Story</h2>
          <p>Publish your heartbreak story for others to read.</p>
        </div>
      </div>

      <div class="story-card">
        <input type="text" id="storyTitle" placeholder="Story Title" />

        <div class="editor-toolbar">
          <button type="button" onclick="formatText('bold')"><b>B</b></button>
          <button type="button" onclick="formatText('italic')"><i>I</i></button>
          <button type="button" onclick="formatText('underline')"><u>U</u></button>
        </div>

        <div id="storyEditor" contenteditable="true" class="story-editor"></div>

        <button class="btn btn-primary" id="postStoryBtn">Publish Story</button>
      </div>
    </div>
  </section>
</main>

<footer>
  <div class="container footer-inner">
    <div>© 2026 Heartspace. All rights reserved.</div>
    <div class="footer-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="discover.html">Explore Stories</a>
      <a href="write.html">Write New</a>
    </div>
  </div>
</footer>
