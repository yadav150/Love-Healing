<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Write Story - Heartspace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="brand">
      <span class="brand-mark">❤</span>
      <span>Heartspace</span>
    </a>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="auth.html">Login</a>
      <a href="index.html#stories">Discover</a>
    </nav>
  </div>
</header>

<main>
  <section class="section">
    <div class="container">
      <h2>Write Your Story ✍️</h2>

      <div class="story-card">

        <input type="text" id="storyTitle" placeholder="Story Title" />

        <div style="margin:10px 0;">
          <button type="button" onclick="formatText('bold')"><b>B</b></button>
          <button type="button" onclick="formatText('italic')"><i>I</i></button>
          <button type="button" onclick="formatText('underline')"><u>U</u></button>
        </div>

        <div id="storyEditor" contenteditable="true"
          style="border:1px solid #ccc; padding:10px; min-height:150px; border-radius:6px;">
        </div>

        <button class="btn btn-primary" id="postStoryBtn" style="margin-top:10px;">
          Publish Story
        </button>

      </div>
    </div>
  </section>
</main>
