<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heartspace — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a href="dashboard.html" class="brand">
      <span class="brand-mark">❤</span>
      <span>Heartspace</span>
    </a>

    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="write.html">Write New</a>
      <a href="discover.html">Explore New</a>
    </nav>

    <div class="nav-actions">
      <button class="btn btn-ghost" id="openProfileBtn">Profile</button>
      <button class="btn btn-primary" id="logoutBtn">Logout</button>
    </div>
  </div>
</header>

<main>
  <section class="section">
    <div class="container">
      <div class="dashboard-hero">
        <div class="dashboard-welcome">
          <div class="avatar-wrap">
            <div class="avatar-circle" id="avatarPreview">❤</div>
            <label class="avatar-upload">
              Change photo
              <input type="file" id="profileImageInput" accept="image/*" hidden />
            </label>
          </div>

          <div>
            <h2 id="welcomeText">Welcome 👋</h2>
            <p id="userEmailText">Email ID</p>
            <p id="lastLoginText">Last login: --</p>
          </div>
        </div>

        <div class="dashboard-actions">
          <a class="btn btn-primary" href="write.html">Write New Story</a>
          <a class="btn btn-ghost" href="discover.html">Explore Stories</a>
        </div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-head">
        <div>
          <h2>My Stories</h2>
          <p>Your written stories appear here.</p>
        </div>
      </div>

      <div id="myStoriesList" class="stories"></div>
    </div>
  </section>
</main>

<!-- Profile modal -->
<div class="modal" id="profileModal">
  <div class="modal-card">
    <button class="modal-close" id="closeProfileBtn">×</button>
    <div class="profile-modal-top">
      <div class="avatar-circle large" id="modalAvatar">❤</div>
      <div>
        <h3 id="profileName">Your Profile</h3>
        <p id="profileEmail">Email ID</p>
        <p id="profileLastLogin">Last login: --</p>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="container footer-inner">
    <div>© 2026 Heartspace. All rights reserved.</div>
    <div class="footer-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="write.html">Write New</a>
      <a href="discover.html">Explore Stories</a>
    </div>
  </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="dashboard.js"></script>
</body>
</html>
